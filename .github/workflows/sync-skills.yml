name: Sync Skills to Skills Repository

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  sync-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout skills repository
        uses: actions/checkout@v4
        with:
          repository: shinyorg/skills
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync skills directory
        run: |
          # Remove old combined skill and individual skills to ensure clean sync
          rm -rf skills-repo/skills/shiny-extensions
          rm -rf skills-repo/skills/shiny-di
          rm -rf skills-repo/skills/shiny-stores
          rm -rf skills-repo/skills/shiny-web-hosting
          rm -rf skills-repo/skills/shiny-maui-hosting
          mkdir -p skills-repo/skills

          # Copy all skills from source
          for skill_dir in source/skills/*/; do
            if [ -d "$skill_dir" ]; then
              skill_name=$(basename "$skill_dir")
              cp -r "$skill_dir" "skills-repo/skills/$skill_name"
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SKILLS_REPO_TOKEN }}
          path: skills-repo
          commit-message: "Update Shiny Extensions skills from Shiny.Extensions repository"
          title: "Update Shiny Extensions skills"
          body: |
            This PR updates the Shiny Extensions skills from the [Shiny.Extensions repository](https://github.com/shinyorg/Shiny.Extensions).

            **Skills synced:** shiny-di, shiny-stores, shiny-web-hosting, shiny-maui-hosting

            **Source commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}

            ---
            *This PR was automatically created by the [sync-skills workflow](https://github.com/shinyorg/Shiny.Extensions/actions/workflows/sync-skills.yml).*
          branch: update-shiny-extensions-skills
          delete-branch: true
          labels: |
            automated
            skills-update
